<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>📰 WSJ Daily Digest</title>
  <style>
    :root {
      --accent: #c41230;
      --accent-dark: #9a0e24;
      --bg: #f9f7f2;
      --card-bg: #ffffff;
      --text: #1a1a1a;
      --muted: #666;
      --border: #e0dcd5;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ─── ヘッダー ─────────────────────────────────── */
    header {
      background: var(--accent);
      color: #fff;
      padding: 20px 32px 16px;
      border-bottom: 4px solid var(--accent-dark);
    }
    header h1 {
      font-size: 28px;
      font-weight: bold;
      letter-spacing: -0.5px;
    }
    header .date {
      font-size: 13px;
      opacity: 0.85;
      margin-top: 4px;
      font-family: 'Arial', sans-serif;
    }

    /* ─── 進捗バー ─────────────────────────────────── */
    #progress-wrap {
      background: #fff;
      border-bottom: 1px solid var(--border);
      padding: 12px 32px;
      display: flex;
      align-items: center;
      gap: 14px;
      font-family: 'Arial', sans-serif;
      font-size: 14px;
      color: var(--muted);
      position: sticky;
      top: 0;
      z-index: 100;
    }
    #progress-wrap.hidden { display: none; }

    .spinner {
      width: 16px;
      height: 16px;
      border: 2px solid #ddd;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      flex-shrink: 0;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    #progress-bar-track {
      flex: 1;
      height: 6px;
      background: #e8e5e0;
      border-radius: 3px;
      overflow: hidden;
    }
    #progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      transition: width 0.4s ease;
      width: 0%;
    }

    /* ─── エラー ────────────────────────────────────── */
    #error-box {
      margin: 24px 32px;
      padding: 16px 20px;
      background: #fff3f3;
      border: 1px solid #f5c6c6;
      border-radius: 6px;
      color: #c0392b;
      font-family: 'Arial', sans-serif;
      font-size: 14px;
      display: none;
    }

    /* ─── 記事一覧 ─────────────────────────────────── */
    #articles {
      max-width: 860px;
      margin: 28px auto;
      padding: 0 24px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ─── 記事カード ────────────────────────────────── */
    .article-card {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 24px 28px 20px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.05);
      animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } }

    .article-date {
      font-family: 'Arial', sans-serif;
      font-size: 12px;
      color: #888;
      margin-bottom: 6px;
      letter-spacing: 0.3px;
    }

    .article-card h2 {
      font-size: 18px;
      line-height: 1.4;
      margin-bottom: 14px;
    }
    .article-card h2 a {
      color: var(--accent);
      text-decoration: none;
    }
    .article-card h2 a:hover { text-decoration: underline; }

    .summary {
      font-size: 15px;
      line-height: 1.75;
      color: #2c2c2c;
      margin-bottom: 14px;
    }

    .why-box {
      background: #fdf8f0;
      border-left: 3px solid #e8a020;
      padding: 12px 16px;
      border-radius: 0 6px 6px 0;
      margin-bottom: 16px;
    }
    .why-box .why-label {
      font-size: 12px;
      font-weight: bold;
      color: #b07010;
      font-family: 'Arial', sans-serif;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 6px;
    }
    .why-box p {
      font-size: 14px;
      line-height: 1.65;
      color: #4a3010;
    }

    .card-footer {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 4px;
    }

    .btn-deep-dive {
      background: #fff;
      border: 1.5px solid var(--accent);
      color: var(--accent);
      padding: 7px 16px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 13px;
      font-family: 'Arial', sans-serif;
      font-weight: 600;
      transition: all 0.15s;
    }
    .btn-deep-dive:hover {
      background: var(--accent);
      color: #fff;
    }
    .btn-deep-dive:disabled {
      opacity: 0.5;
      cursor: default;
      background: #fff;
      color: var(--accent);
    }

    .deep-dive-result {
      margin-top: 18px;
      background: #f4f0ff;
      border: 1px solid #c9b8ff;
      border-radius: 6px;
      padding: 18px 20px;
    }
    .deep-dive-result h3 {
      font-size: 14px;
      font-family: 'Arial', sans-serif;
      font-weight: bold;
      color: #5a2d91;
      margin-bottom: 10px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .deep-dive-result p {
      font-size: 14px;
      line-height: 1.75;
      color: #2d1a50;
    }

    .loading-inline {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 13px;
      font-family: 'Arial', sans-serif;
      color: var(--muted);
      margin-top: 14px;
    }

    /* ─── 完了メッセージ ─────────────────────────────── */
    #done-banner {
      max-width: 860px;
      margin: 0 auto 32px;
      padding: 0 24px;
      display: none;
    }
    #done-banner .inner {
      background: #edf7ed;
      border: 1px solid #a3d9a5;
      border-radius: 6px;
      padding: 14px 20px;
      font-family: 'Arial', sans-serif;
      font-size: 14px;
      color: #2d6a2f;
    }

    /* ─── 共有ボタン ─────────────────────────────────── */
    .share-wrap {
      max-width: 860px;
      margin: 0 auto 16px;
      padding: 0 24px;
      display: none;
    }
    .btn-share {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 10px 24px;
      border-radius: 6px;
      font-family: 'Arial', sans-serif;
      font-size: 14px;
      font-weight: bold;
      cursor: pointer;
      transition: background 0.15s;
    }
    .btn-share:hover { background: var(--accent-dark); }
    .share-toast {
      display: inline-block;
      margin-left: 12px;
      font-size: 13px;
      color: #2d6a2f;
      opacity: 0;
      transition: opacity 0.3s;
    }
    .share-toast.visible { opacity: 1; }

    /* ─── オプションリンク ─────────────────────────────── */
    footer {
      text-align: center;
      padding: 24px;
      font-family: 'Arial', sans-serif;
      font-size: 12px;
      color: #aaa;
    }
    footer a { color: #aaa; }
  </style>
</head>
<body>

  <header>
    <h1>📰 WSJ Daily Digest</h1>
    <div class="date" id="date-label"></div>
  </header>

  <div id="progress-wrap">
    <div class="spinner" id="spinner"></div>
    <span id="status-text">準備中...</span>
    <div id="progress-bar-track">
      <div id="progress-bar-fill"></div>
    </div>
    <span id="count-text" style="white-space:nowrap"></span>
  </div>

  <div id="error-box"></div>

  <div id="articles"></div>

  <div id="done-banner">
    <div class="inner" id="done-inner"></div>
  </div>

  <div class="share-wrap" id="share-wrap">
    <button class="btn-share" id="btn-share">📋 LINE / Slack に共有</button>
    <span class="share-toast" id="share-toast">コピーしました！</span>
  </div>

  <footer>
    <a href="#" id="options-link">⚙️ APIキー設定</a>
  </footer>

  <script src="digest.js"></script>
</body>
</html>
