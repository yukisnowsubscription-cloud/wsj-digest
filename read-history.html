<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>既読記事の管理 — WSJ Digest</title>
  <style>
    :root {
      --accent: #e05070;
      --accent-dark: #c03050;
      --bg: #121212;
      --card-bg: #1e1e1e;
      --text: #e8e8e8;
      --muted: #aaa;
      --border: #333;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Georgia', 'Times New Roman', serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      padding: 40px 32px;
    }
    h1 {
      font-size: 22px;
      color: var(--accent);
      margin-bottom: 8px;
    }
    .subtitle {
      font-size: 13px;
      font-family: 'Arial', sans-serif;
      color: var(--muted);
      margin-bottom: 24px;
    }
    .actions {
      margin-bottom: 24px;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .btn {
      font-family: 'Arial', sans-serif;
      font-size: 13px;
      font-weight: bold;
      padding: 8px 18px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn-danger { background: #c03050; color: #fff; }
    .count-label {
      font-family: 'Arial', sans-serif;
      font-size: 13px;
      color: var(--muted);
    }
    .empty {
      font-family: 'Arial', sans-serif;
      font-size: 14px;
      color: var(--muted);
      padding: 40px 0;
      text-align: center;
    }
    #list {
      max-width: 700px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }
    .read-item {
      background: var(--card-bg);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 12px 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .read-item .info { flex: 1; min-width: 0; }
    .read-item .title {
      font-size: 14px;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .read-item .title a {
      color: var(--accent);
      text-decoration: none;
    }
    .read-item .title a:hover { text-decoration: underline; }
    .read-item .meta {
      font-family: 'Arial', sans-serif;
      font-size: 11px;
      color: #888;
      margin-top: 2px;
    }
    .btn-remove {
      flex-shrink: 0;
      font-family: 'Arial', sans-serif;
      font-size: 12px;
      padding: 5px 12px;
      border-radius: 4px;
      border: 1px solid #555;
      background: transparent;
      color: var(--muted);
      cursor: pointer;
      transition: all 0.15s;
    }
    .btn-remove:hover {
      border-color: var(--accent);
      color: var(--accent);
    }
    .back-link {
      display: inline-block;
      margin-top: 32px;
      font-family: 'Arial', sans-serif;
      font-size: 13px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <h1>📋 既読記事の管理</h1>
  <p class="subtitle">チェック済みの記事は次回のダイジェスト実行時にスキップされます。解除すれば再び要約対象になります。</p>

  <div class="actions">
    <button class="btn btn-danger" id="btn-clear-all">すべてクリア</button>
    <span class="count-label" id="count-label"></span>
  </div>

  <div id="list"></div>

  <a class="back-link" href="#" id="back-link">← ダイジェストに戻る</a>

  <script src="read-history.js"></script>
</body>
</html>
